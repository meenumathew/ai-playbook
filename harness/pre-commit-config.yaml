# AI Playbook pre-commit hooks.
# Keep this fast and language-neutral; enforce full gates via `make quality` in CI.
#
# Repo-own twin: this repository's `.pre-commit-config.yaml` adds repo-specific
# hooks (vale, lychee, ruff) on top of this set — intentional deltas. The
# shared core (secrets scanning, shellcheck, teach-back-trailer) must match;
# `tests/acceptance/test_harness_release_contracts.py` pins the shared hooks.
exclude: ^(node_modules|dist|build|target|vendor|\.venv|\.mypy_cache|\.pytest_cache)/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce  # frozen: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # frozen: v0.11.0.1
    hooks:
      - id: shellcheck

  # Universal Markdown lint — every adopter ships markdown (READMEs, agent
  # files, KB), regardless of stack. Drop `.markdownlint.jsonc` into the
  # repo root to customise rules; without it, markdownlint-cli2 uses its
  # defaults.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda  # frozen: v0.22.1
    hooks:
      - id: markdownlint-cli2
        exclude: "^(node_modules|dist|build|vendor|\\.venv|\\.pytest_cache)/"

  - repo: local
    hooks:
      - id: format-check
        name: format-check
        entry: make format-check
        language: system
        pass_filenames: false
        always_run: true

      - id: teach-back-trailer
        name: teach-back-trailer
        entry: harness/check-teachback.sh
        language: system
        stages: [commit-msg]
        # Only invoked at commit-msg time — pre-commit passes the message
        # file path as $1. Skip with CLAUDE_SKIP_TEACHBACK=1 for emergencies.
