name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install Vale
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/errata-ai/vale/v3/cmd/vale@v3.9.6
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quality gates
        run: make quality

      - name: Dependency vulnerability scan
        run: |
          # Mirror ci.yml so the release path is machine-checked, not human-
          # checked. A tag push must not bypass the same scans every PR runs.
          uv export --no-hashes --no-dev --no-emit-project > /tmp/runtime-requirements.txt
          uvx pip-audit==2.10.0 --strict --requirement /tmp/runtime-requirements.txt

      - name: Static security scan (Bandit)
        run: |
          uvx bandit==1.9.4 -r src/ -ll -ii
          uvx bandit==1.9.4 -r tests/ evals/ -ll -ii --skip B101

      - name: Secret scan
        run: |
          uvx pre-commit==4.3.0 run detect-private-key --all-files
          uvx pre-commit==4.3.0 run gitleaks --all-files

      - name: Smoke-test console script (source)
        run: |
          set -euo pipefail
          uv run ai-playbook list >/dev/null
          for tool in claude copilot cursor kiro; do
            tmpdir="$(mktemp -d)"
            uv run ai-playbook deploy --agent all --tool "$tool" -t "$tmpdir" --no-mcp >/dev/null
            uv run ai-playbook doctor --tool "$tool" -t "$tmpdir" >/dev/null
          done

      - name: Build wheel and smoke-test installed artifact
        run: |
          set -euo pipefail
          uv build
          uvx twine==6.2.0 check dist/*
          venv="$(mktemp -d)/venv"
          uv venv "$venv"
          uv pip install --python "$venv/bin/python" dist/*.whl
          "$venv/bin/ai-playbook" list >/dev/null
          for tool in claude copilot cursor kiro; do
            tmpdir="$(mktemp -d)"
            "$venv/bin/ai-playbook" deploy --agent all --tool "$tool" -t "$tmpdir" --no-mcp >/dev/null
            "$venv/bin/ai-playbook" doctor --tool "$tool" -t "$tmpdir" >/dev/null
          done

  build:
    name: Build wheel + SBOM
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build distribution
        run: |
          rm -rf dist/
          uv build
          uvx twine==6.2.0 check dist/*

      - name: Generate CycloneDX SBOM
        run: |
          uv venv .sbom-venv
          uv pip install --python .sbom-venv/bin/python dist/*.whl
          uvx --from cyclonedx-bom==7.2.1 cyclonedx-py environment .sbom-venv \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --of JSON \
            --output-file dist/sbom.cdx.json

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  sign:
    name: Sign artifacts with Sigstore
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --generate-notes

      - name: Attach signed artifacts + SBOM to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/*.sigstore.json \
            dist/sbom.cdx.json \
            --clobber

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/ai-playbook/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Remove non-distribution files before upload
        run: |
          mkdir -p upload
          mv dist/*.whl dist/*.tar.gz upload/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: upload/
          attestations: true
