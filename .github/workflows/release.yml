name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Install Vale
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/errata-ai/vale/v3/cmd/vale@v3.9.6
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quality gates
        run: make quality

      - name: Dependency vulnerability scan
        run: |
          # Mirror ci.yml so the release path is machine-checked, not human-
          # checked. A tag push must not bypass the same scans every PR runs.
          uv export --no-hashes --no-dev --no-emit-project > /tmp/runtime-requirements.txt
          uvx pip-audit==2.10.0 --strict --requirement /tmp/runtime-requirements.txt

      - name: Static security scan (Bandit)
        run: |
          uvx bandit==1.9.4 -r src/ -ll -ii
          uvx bandit==1.9.4 -r tests/ evals/ -ll -ii --skip B101

      - name: Secret scan
        run: |
          uvx pre-commit==4.3.0 run detect-private-key --all-files
          uvx pre-commit==4.3.0 run gitleaks --all-files

      - name: Smoke-test console script (source)
        run: |
          set -euo pipefail
          uv run ai-playbook list >/dev/null
          for tool in claude copilot cursor kiro; do
            tmpdir="$(mktemp -d)"
            uv run ai-playbook deploy --agent all --tool "$tool" -t "$tmpdir" --no-mcp >/dev/null
            uv run ai-playbook doctor --tool "$tool" -t "$tmpdir" >/dev/null
          done

      - name: Build wheel and smoke-test installed artifact
        run: |
          set -euo pipefail
          uv build
          uvx twine==6.2.0 check dist/*
          venv="$(mktemp -d)/venv"
          uv venv "$venv"
          uv pip install --python "$venv/bin/python" dist/*.whl
          "$venv/bin/ai-playbook" list >/dev/null
          for tool in claude copilot cursor kiro; do
            tmpdir="$(mktemp -d)"
            "$venv/bin/ai-playbook" deploy --agent all --tool "$tool" -t "$tmpdir" --no-mcp >/dev/null
            "$venv/bin/ai-playbook" doctor --tool "$tool" -t "$tmpdir" >/dev/null
          done

  build:
    name: Build wheel + SBOM
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Build distribution
        run: |
          rm -rf dist/
          uv build
          uvx twine==6.2.0 check dist/*

      - name: Generate CycloneDX SBOM
        run: |
          uv venv .sbom-venv
          uv pip install --python .sbom-venv/bin/python dist/*.whl
          uvx --from cyclonedx-bom==7.2.1 cyclonedx-py environment .sbom-venv \
            --pyproject pyproject.toml \
            --mc-type library \
            --output-reproducible \
            --of JSON \
            --output-file dist/sbom.cdx.json

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  sign:
    name: Sign artifacts with Sigstore
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --generate-notes

      - name: Attach signed artifacts + SBOM to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/*.sigstore.json \
            dist/sbom.cdx.json \
            --clobber

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/ai-playbook/
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Remove non-distribution files before upload
        run: |
          mkdir -p upload
          mv dist/*.whl dist/*.tar.gz upload/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: upload/
          attestations: true
