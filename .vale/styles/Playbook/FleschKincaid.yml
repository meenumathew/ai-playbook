extends: metric
message: "Flesch-Kincaid grade level is %s. For adopter-facing docs, consider shorter sentences or simpler wording."
link: https://en.wikipedia.org/wiki/Flesch%E2%80%93Kincaid_readability_tests
level: warning
formula: |
  (0.39 * (words / sentences)) + (11.8 * (syllables / words)) - 15.59
condition: "> 12.0"