StylesPath = .vale/styles
Packages = Google

MinAlertLevel = warning

Vocab = Playbook

# All markdown files — Playbook + Google house standard.
# Diataxis is NOT loaded globally. Each Diataxis rule is allow-listed, enabled
# only on the folders whose quadrant it fits (see docs/** sections below). This
# stops a tutorial/reference rule from firing on agent files, knowledge-base, or
# vendored markdown.
#
# Playbook.NoEmDash is the blocking house rule: rewrite sentences instead of
# using em dashes. Google.EmDash stays disabled because it checks dash spacing,
# not the playbook's no-em-dash style.
# Google house-style rules remain visible as warnings. Playbook-specific safety,
# professionalism, spelling, and inclusive-language rules are the blocking gate.
[*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Google.Latin = warning
Google.Quotes = warning
Google.Units = warning
Google.LyHyphens = warning
Google.AMPM = warning
Google.Spacing = warning
Google.Ordinal = warning
Google.Passive = warning
Google.WordList = error
Google.We = warning
Google.Headings = suggestion
Google.Spelling = error
Google.GenderBias = error
Playbook.FleschKincaid = NO

# docs/** — adopter-visible Diataxis docs; strictest gate.
# Diataxis rules are allow-listed per folder below, not applied uniformly here.
# Each page belongs to exactly one quadrant, so the four voices contradict each
# other across pages (a correct tutorial saying "in this tutorial" would trip
# HowToVoice). Voice and title rules are nudged only where a folder maps cleanly
# to one quadrant (how-to, adr, rfcs); for the mixed-quadrant root docs,
# docs-maintainer + review own voice per docs/docs-guide.md.
[docs/**/*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Google.Spelling = error
Google.GenderBias = error
Google.WordList = error
Google.Passive = warning
Playbook.FleschKincaid = warning

# How-to guides live here and are single-quadrant: nudge task-focused voice and
# enforce the "How to ..." H1 title.
[docs/how-to/**/*.md]
Diataxis.HowToVoice = warning
Diataxis.HowToTitle = warning

# ADRs are explanation-quadrant: nudge against embedded step-by-step instructions
# and against titles that read like a how-to, tutorial, or reference page.
[docs/adr/**/*.md]
Diataxis.ExplanationVoice = warning
Diataxis.ExplanationTitle = warning
Diataxis.Steps = warning

# rfcs/ is intentionally NOT wired: per docs-guide its README is a how-to
# process recipe (legitimate steps) while individual RFCs are explanation, so
# the folder is mixed-quadrant. docs-maintainer + review own voice there.

# Agent files — same rules, but imperative voice exempt
[agents/*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Playbook.Weasels = NO
Playbook.PassiveVoice = NO
Google.Passive = NO
Google.We = NO
Google.Spelling = error
Google.GenderBias = error
Google.WordList = warning
Diataxis.TutorialVoice = NO
Diataxis.HowToVoice = NO
Diataxis.ReferenceVoice = NO
Diataxis.ExplanationVoice = NO

# Templates — placeholder text; relaxed but spelling + bias still apply
[templates/*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Playbook.PassiveVoice = NO
Google.Passive = NO
Google.We = NO
Google.Spelling = warning
Google.GenderBias = error
Google.WordList = warning

# Knowledge-base — explanation voice allowed; warning gate (not blocking)
[knowledge-base/**/*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Diataxis.ExplanationVoice = warning
Google.Spelling = error
Google.GenderBias = error
Google.WordList = warning
Google.Passive = warning

# Evals — adversarial/quoted fixtures; rules off by design
[evals/*.md]
BasedOnStyles = Playbook
Playbook.NoEmDash = NO
Playbook.PassiveVoice = NO
Playbook.Weasels = NO
Playbook.Headings = NO
Playbook.Acronyms = NO
Playbook.Contractions = NO
Playbook.ProfessionalTone = NO
Playbook.DisplayNames = NO

# Skills — instructional; skip Diataxis, keep spelling + bias strict
[skills/**/*.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Google.Passive = NO
Google.We = NO
Google.Spelling = error
Google.GenderBias = error
Google.WordList = warning

# CLAUDE.md — reference/rules doc, not a Diataxis quadrant
[CLAUDE.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Diataxis.TutorialVoice = NO
Diataxis.HowToVoice = NO
Diataxis.ReferenceVoice = NO
Diataxis.ExplanationVoice = NO
Google.Spelling = error
Google.GenderBias = error
Google.WordList = error
Google.Passive = warning

# README, CONTRIBUTING, CHANGELOG — adopter-visible, strict gate
[README.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Google.Spelling = error
Google.GenderBias = error
Google.WordList = error
Google.Passive = warning
Playbook.FleschKincaid = warning

[CONTRIBUTING.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Google.Spelling = error
Google.GenderBias = error
Google.WordList = error
Google.Passive = warning
Playbook.FleschKincaid = warning

[CHANGELOG.md]
BasedOnStyles = Playbook, Google
Google.EmDash = NO
Playbook.NoEmDash = error
Playbook.PassiveVoice = NO
Google.Passive = NO
Google.Spelling = error
Google.GenderBias = error
Google.WordList = warning
